<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bramble's Dash - ブランブルのぼうけん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --bg0:#10183a; --bg1:#1b2a5e; --accent:#ffd23a; --accent2:#ff7a3a; --panel:#0c1330; --line:#39509e;
    --moveSize:clamp(78px,15vmin,124px); --jumpSize:clamp(92px,18vmin,150px); --dashSize:clamp(62px,12vmin,102px); }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Baloo 2","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #2a3f86 0%, rgba(42,63,134,0) 60%),
      radial-gradient(900px 600px at 85% 110%, #3a2a6e 0%, rgba(58,42,110,0) 55%),
      linear-gradient(160deg, var(--bg0), #0a1130 70%);
    color:#eaf0ff; min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:14px 12px 26px; -webkit-tap-highlight-color:transparent; overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.25;
    background-image:radial-gradient(rgba(255,255,255,.12) 1px, transparent 1px);
    background-size:22px 22px; -webkit-mask:radial-gradient(120% 100% at 50% 0, #000 30%, transparent 75%);
    mask:radial-gradient(120% 100% at 50% 0, #000 30%, transparent 75%);
  }
  header{ text-align:center; margin-bottom:12px; z-index:1; }
  header h1{
    font-family:"Press Start 2P",monospace; font-weight:400;
    font-size:clamp(14px,3.6vw,26px); letter-spacing:1px; margin:0; color:var(--accent);
    text-shadow:0 2px 0 #b9780c,0 4px 0 #7a4e06,0 6px 10px rgba(0,0,0,.5);
  }
  header p{ margin:8px 0 0; font-weight:700; font-size:clamp(11px,2.2vw,14px); color:#bcd0ff; opacity:.9; }
  .stage-wrap{ position:relative; width:100%; max-width:980px; z-index:1; }
  .stage{
    position:relative; width:100%; aspect-ratio:16/9; border-radius:18px; overflow:hidden; background:#7cc0ff;
    box-shadow:0 0 0 4px #0c1330,0 0 0 10px #2a3f86,0 18px 40px rgba(0,0,0,.55),inset 0 0 60px rgba(0,0,0,.25);
  }
  .stage::after{
    content:""; position:absolute; inset:0; pointer-events:none; border-radius:18px;
    box-shadow:inset 0 0 90px rgba(0,0,0,.28);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 18%);
  }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }
  .stage:fullscreen, .stage:-webkit-full-screen{ width:100vw; height:100vh; max-width:none; aspect-ratio:auto; border-radius:0; }
  .stage:fullscreen::after, .stage:-webkit-full-screen::after{ border-radius:0; }
  .topbtns{ position:absolute; top:max(10px,env(safe-area-inset-top)); right:max(10px,env(safe-area-inset-right)); display:flex; gap:10px; z-index:6; }
  .iconbtn{
    width:44px; height:44px; border-radius:13px; border:none; cursor:pointer;
    background:rgba(12,19,48,.6); color:#fff; font-size:20px; font-weight:800;
    backdrop-filter:blur(4px); box-shadow:0 3px 10px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  .iconbtn:active{ transform:translateY(1px) scale(.96); }
  .touch{ position:absolute; inset:0; z-index:4; pointer-events:none; display:none; }
  .touch.show{ display:block; }
  .pad{ position:absolute; left:max(18px,env(safe-area-inset-left)); bottom:max(20px,env(safe-area-inset-bottom)); display:flex; gap:14px; align-items:flex-end; }
  .btns{ position:absolute; right:max(18px,env(safe-area-inset-right)); bottom:max(20px,env(safe-area-inset-bottom)); display:flex; gap:16px; align-items:flex-end; }
  .tbtn{
    pointer-events:auto; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; touch-action:none;
    border:none; color:#fff; font-family:"Baloo 2","Hiragino Maru Gothic ProN",sans-serif; font-weight:800; line-height:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-shadow:0 2px 4px rgba(0,0,0,.45);
    transition:transform .04s, filter .04s;
  }
  .tbtn:active{ transform:translateY(2px) scale(.94); filter:brightness(1.18); }
  .tbtn .lbl{ font-size:.4em; margin-top:.22em; letter-spacing:.5px; opacity:.96; white-space:nowrap; }
  .move{ width:var(--moveSize); height:var(--moveSize); border-radius:26px; font-size:calc(var(--moveSize)*.5);
    background:linear-gradient(180deg,rgba(86,140,235,.66),rgba(44,86,180,.66));
    box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 3px 0 rgba(255,255,255,.3), inset 0 0 0 3px rgba(255,255,255,.2); }
  .jump{ width:var(--jumpSize); height:var(--jumpSize); border-radius:50%; font-size:calc(var(--jumpSize)*.3);
    background:radial-gradient(circle at 50% 34%,#84e792,#34a24c 72%);
    box-shadow:0 9px 22px rgba(0,0,0,.5), inset 0 4px 0 rgba(255,255,255,.38), inset 0 0 0 4px rgba(255,255,255,.24); }
  .jump .ico{ font-size:1.55em; }
  .dash{ width:var(--dashSize); height:var(--dashSize); border-radius:50%; margin-bottom:calc(var(--jumpSize)*.3); font-size:calc(var(--dashSize)*.34);
    background:radial-gradient(circle at 50% 34%,#ffc857,#ef8a26 72%);
    box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 3px 0 rgba(255,255,255,.32), inset 0 0 0 3px rgba(255,255,255,.22); }
  .dash .ico{ font-size:1.25em; }
  .legend{ margin-top:14px; display:flex; flex-wrap:wrap; gap:8px 10px; justify-content:center; z-index:1; max-width:900px; }
  .chip{ background:var(--panel); border:1.5px solid var(--line); border-radius:999px; padding:6px 12px; font-weight:700; font-size:12.5px; color:#cfe0ff; display:flex; align-items:center; gap:7px; }
  .chip b{ color:var(--accent); font-family:"Press Start 2P",monospace; font-size:10px; }
  footer{ margin-top:16px; font-size:12px; color:#8ea0d8; text-align:center; z-index:1; }
  @media (max-width:560px){ header p{ display:none; } .legend{ display:none; } }
</style>
</head>
<body>
  <header>
    <h1>BRAMBLE'S DASH</h1>
    <p>ブランブルのぼうけん — 横スクロール アクション</p>
  </header>
  <div class="stage-wrap">
    <div class="stage" id="stage">
      <canvas id="game"></canvas>
      <div class="topbtns">
        <button class="iconbtn" id="pauseBtn" title="ポーズ">&#10074;&#10074;</button>
        <button class="iconbtn" id="muteBtn" title="ミュート">&#9834;</button>
        <button class="iconbtn" id="fsBtn" title="全画面">&#9974;</button>
      </div>
      <div class="touch" id="touch">
        <div class="pad">
          <button class="tbtn move" id="btn-left" aria-label="ひだりにすすむ">&#9664;</button>
          <button class="tbtn move" id="btn-right" aria-label="みぎにすすむ">&#9654;</button>
          <button id="btn-down" aria-label="しゃがむ" style="display:none">&#9660;</button>
        </div>
        <div class="btns">
          <button class="tbtn dash" id="btn-b" aria-label="ダッシュ"><span class="ico">&#187;</span><span class="lbl">ダッシュ</span></button>
          <button class="tbtn jump" id="btn-a" aria-label="ジャンプ"><span class="ico">&#9650;</span><span class="lbl">ジャンプ</span></button>
        </div>
      </div>
    </div>
  </div>
  <div class="legend">
    <span class="chip"><b>&#8592; &#8594;</b> 移動</span>
    <span class="chip"><b>SPACE / &#8593; / Z</b> ジャンプ</span>
    <span class="chip"><b>X / SHIFT</b> ダッシュ・ファイア</span>
    <span class="chip"><b>&#8595;</b> しゃがむ</span>
    <span class="chip"><b>P / ENTER</b> ポーズ</span>
    <span class="chip"><b>M</b> 音切替</span>
  </div>
  <footer>キノコで大きく、花でファイア。敵は上から踏む。甲羅は蹴れる。土管の花に注意！</footer>
<script>
(() => {
'use strict';

/* ===== core/constants.js ===== */

const GRAVITY = 0.42, HOLD_G = 0.22, JUMP_V = 5.0, MAXFALL = 7.6;
const GRAVITY_E = 0.4;

const STEP = 1/60;
const SPRING_V = 8.7;

const THEMES = {

    mountain:'#8fd6a6', mountainDark:'#69bd88',

    brick:'#8c3a4a', brickLine:'#561e2a', stone:'#5a4658', stoneDark:'#382838', used:'#4a3548', usedDark:'#2e2030' },
  water:{ cave:false, water:true, skyTop:'#16689f', skyMid:'#2a93c8', skyBot:'#62cad8', glow:'rgba(190,240,255,0.45)', accent:'#bfefff',
    mountain:'#1f6f7e', mountainDark:'#15565f',
    hill:'#2f8f9e', hillDark:'#1f6f7e', bush:'#36b0a0', bushDark:'#1f8f80', bushLight:'#6fd0c0',
    grass:'#3fc6c0', grassDark:'#2a9a96', soil:'#d8c48a', soilDark:'#a88f5a', soilEdge:'#c4ad72',
    brick:'#5aa6b0', brickLine:'#2f6f78', stone:'#7fbfc8', stoneDark:'#4f8f98', used:'#5a8f96', usedDark:'#386870' }
};

const DIFFICULTY = [
  { id:'normal', name:'ふつう',                lives:3,  timeMul:1.0, enemyMul:1.0,  noHurt:false, noGameOver:false, startBig:false, jumpMul:1.00, gravityMul:1.00, fallMul:1.00, coyoteMul:1.0, bufferMul:1.0, cutKeep:0.45 },
  { id:'age5',   name:'やさしい（5さい）',      lives:5,  timeMul:0.5, enemyMul:0.6,  noHurt:false, noGameOver:false, startBig:true,  jumpMul:1.12, gravityMul:0.86, fallMul:0.9,  coyoteMul:2.6, bufferMul:2.6, cutKeep:0.78 },
  { id:'age3',   name:'とてもやさしい（3さい）', lives:99, timeMul:0.0, enemyMul:0.42, noHurt:true,  noGameOver:true,  startBig:true,  jumpMul:1.20, gravityMul:0.74, fallMul:0.8,  coyoteMul:4.0, bufferMul:4.0, cutKeep:1.0  },
];


const SKINS = [
  { id:'bramble', name:'ブランブル', sw:'#ff9a3c', trait:'バランスがよい', icon:'balance', stats:{ jump:1.00, speed:1.00, fall:1.00 } },
  { id:'mint', name:'ミント', sw:'#5fce72', trait:'たかく ジャンプ', icon:'jump', stats:{ jump:1.15, speed:0.97, fall:1.00 }, pal:{ body:'#5fce72', top:'#8ee6a0', shade:'#2fa14e', belly:'#e2ffe8', cheek:'#3fae5e', foot:'#2f8f4e', out:'#1d6e36' } },
  { id:'sora', name:'ソラ', sw:'#5aa6ff', trait:'はやく はしる', icon:'speed', stats:{ jump:1.00, speed:1.20, fall:1.00 }, pal:{ body:'#5aa6ff', top:'#8cc4ff', shade:'#2f6fd6', belly:'#e0efff', cheek:'#4a8ae6', foot:'#2f6fd6', out:'#1d4e9e' } },
  { id:'momo', name:'モモ', sw:'#ff8ad2', trait:'ふんわり おちる', icon:'float', stats:{ jump:1.06, speed:0.97, fall:0.74 }, pal:{ body:'#ff8ad2', top:'#ffb1e2', shade:'#e6589e', belly:'#ffe6f4', cheek:'#ff6abf', foot:'#d4569e', out:'#a83a76' } },
  { id:'gold', name:'きんいろ', sw:'#ffd23a', hidden:true, trait:'スーパーパワー', icon:'star', stats:{ jump:1.10, speed:1.10, fall:0.88 }, pal:{ body:'#ffd23a', top:'#fff0a8', shade:'#e0a51e', belly:'#fff7d6', cheek:'#ffbe4a', foot:'#cf8f1a', out:'#9c7012' } },
  { id:'rainbow', name:'にじいろ', sw:'#ff6bd6', hidden:true, rainbow:true, trait:'にじの ちから', icon:'sparkle', stats:{ jump:1.14, speed:1.14, fall:0.80 } },
];

/* ===== core/utils.js ===== */
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const lerp = (a,b,t)=> a+(b-a)*t;
const rand = (a,b)=> a+Math.random()*(b-a);
function mulberry32(seed){ return function(){ let t=seed+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; }; }
function aabb(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

/* ===== engine/canvas.js ===== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
let camW = 412, camH = BASE_VIEW_H, scale = 2;

function rr(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2); c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function ellipse(x,y,rx,ry){ ctx.beginPath(); ctx.ellipse(x,y,Math.max(0.1,rx),Math.max(0.1,ry),0,0,Math.PI*2); ctx.fill(); }

function resize(){
  const cssW=stage.clientWidth||640, cssH=stage.clientHeight||360;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.max(1,Math.round(cssW*dpr)); canvas.height=Math.max(1,Math.round(cssH*dpr));
  const aspect=cssW/cssH;
  camW=clamp(BASE_VIEW_H*aspect,320,640); camH=camW/aspect; scale=canvas.width/camW;
  ctx.imageSmoothingEnabled=true;
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));
if(window.ResizeObserver){ new ResizeObserver(resize).observe(stage); }
function worldTransform(f){ ctx.setTransform(scale,0,0,scale,0,0); ctx.translate(-game.camX*f,-game.camY); }

/* ===== engine/audio.js ===== */
// ============ AUDIO ============
let AC=null, master=null, sfxGain=null, musicGain=null, audioReady=false, muted=false, musicOn=true;
let musicTimer=null, seqArr=[], loopBeats=8, schedIdx=0, loopStartTime=0, SPB=60/138, curTrack='map';
const TRACKS = {
  overworld:{ bpm:138, chords:[[60,64,67],[57,60,64],[53,57,60],[55,59,62]] },
  cave:{ bpm:104, chords:[[57,60,64],[55,58,62],[53,56,60],[52,55,59]] },
  sky:{ bpm:152, chords:[[62,66,69],[60,64,67],[64,67,71],[59,62,67]] },
  castle:{ bpm:120, chords:[[55,58,62],[54,57,61],[53,56,60],[52,55,59]] },
  boss:{ bpm:150, style:'boss', chords:[[57,60,64],[56,59,63],[55,58,62],[57,60,64]] },
  map:{ bpm:126, chords:[[60,64,67],[62,65,69],[64,67,71],[59,62,66]] },
  water:{ bpm:112, chords:[[60,64,67],[62,67,71],[64,67,72],[59,62,67]] },
  bonus:{ bpm:150, chords:[[67,71,74],[65,69,72],[64,67,72],[62,66,69]] }
};
function initAudioOnce(){
  if(audioReady){ if(AC.state==='suspended') AC.resume(); return; }
  try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  master=AC.createGain(); master.gain.value=muted?0:0.85; master.connect(AC.destination);
  sfxGain=AC.createGain(); sfxGain.gain.value=0.5; sfxGain.connect(master);
  musicGain=AC.createGain(); musicGain.gain.value=0.18; musicGain.connect(master);
  audioReady=true; startMusic();
}
function toggleMute(){ muted=!muted; if(master) master.gain.value=muted?0:0.85; document.getElementById('muteBtn').innerHTML=muted?'&#9834;&#824;':'&#9834;'; }
function duckMusic(v){ if(musicGain&&AC) musicGain.gain.setTargetAtTime(0.18*v, AC.currentTime, 0.05); }
function blip(o){
  if(!audioReady) return;
  const t0=AC.currentTime+(o.when||0); const dur=o.dur||0.1;
  const osc=AC.createOscillator(), g=AC.createGain();
  osc.type=o.type||'square';
  osc.frequency.setValueAtTime(o.f0||440,t0);
  if(o.f1 && o.f1!==o.f0) osc.frequency.exponentialRampToValueAtTime(Math.max(1,o.f1), t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(o.vol||0.3, t0+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(g); g.connect(o.bus||sfxGain); osc.start(t0); osc.stop(t0+dur+0.03);
}
function noiseBurst(o){
  if(!audioReady) return;
  const t0=AC.currentTime+(o.when||0); const dur=o.dur||0.15;
  const buf=AC.createBuffer(1, Math.ceil(AC.sampleRate*dur), AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf;
  const f=AC.createBiquadFilter(); f.type=o.filter||'lowpass'; f.frequency.value=o.freq||1400;
  const g=AC.createGain(); g.gain.setValueAtTime(o.vol||0.3,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  src.connect(f); f.connect(g); g.connect(sfxGain); src.start(t0); src.stop(t0+dur);
}
function seq(notes,type,vol){ if(!audioReady) return; let w=0; for(const n of notes){ blip({type:type||'square', f0:n[0], f1:n[0], dur:n[1]*0.92, vol:vol||0.26, when:w}); w+=n[1]; } }
const sfxJump   = ()=> blip({type:'square', f0:300, f1:660, dur:0.15, vol:0.22});
const sfxStomp  = ()=> { noiseBurst({filter:'lowpass', freq:1100, dur:0.1, vol:0.32}); blip({type:'square', f0:220, f1:90, dur:0.1, vol:0.2}); };
const sfxCoin   = ()=> { blip({type:'square', f0:988, dur:0.06, vol:0.25}); blip({type:'square', f0:1319, dur:0.14, vol:0.25, when:0.06}); };
const sfxBump   = ()=> blip({type:'square', f0:180, f1:120, dur:0.08, vol:0.22});
const sfxBreak  = ()=> { noiseBurst({filter:'lowpass', freq:2600, dur:0.18, vol:0.4}); blip({type:'square', f0:240, f1:120, dur:0.1, vol:0.2}); };
const sfxKick   = ()=> blip({type:'square', f0:520, f1:180, dur:0.12, vol:0.25});
const sfxFire   = ()=> { blip({type:'sawtooth', f0:700, f1:1500, dur:0.08, vol:0.18}); noiseBurst({filter:'highpass', freq:1800, dur:0.06, vol:0.14}); };

function buildSeq(track){
  const cfg=TRACKS[track]||TRACKS.map; SPB=60/cfg.bpm; const chords=cfg.chords;
  seqArr=[]; let tb=0; const e=0.5;
  if(cfg.style==='boss'){
    for(const ch of chords){
      for(let i=0;i<4;i++) seqArr.push({t:tb+i*e, dur:e*0.46, midi:ch[0]-12, voice:'bass'}); // pulsing 8th-note bass
      seqArr.push({t:tb+0,     dur:e*0.7, midi:ch[0]+12, voice:'lead'});
      seqArr.push({t:tb+e*0.5, dur:e*0.4, midi:ch[2]+12, voice:'lead'});
      seqArr.push({t:tb+e*1.0, dur:e*0.7, midi:ch[1]+12, voice:'lead'});
      seqArr.push({t:tb+e*1.5, dur:e*0.4, midi:ch[0]+19, voice:'lead'});
      tb+=2;
    }
    loopBeats=tb; return;
  }
  // A section
  for(const ch of chords){
    const pat=[ch[0]+12, ch[1]+12, ch[2]+12, ch[1]+12];
    for(let i=0;i<4;i++) seqArr.push({t:tb+i*e, dur:e*0.9, midi:pat[i], voice:'lead'});
    seqArr.push({t:tb, dur:0.9, midi:ch[0]-12, voice:'bass'});
    seqArr.push({t:tb+1, dur:0.9, midi:ch[2]-12, voice:'bass'});
    tb+=2;
  }
  // B section (variation): arpeggio lead + light offbeat sparkle, alternate bass
  for(const ch of chords){
    const pat=[ch[2]+12, ch[0]+24, ch[1]+12, ch[2]+12];
    for(let i=0;i<4;i++) seqArr.push({t:tb+i*e, dur:e*0.8, midi:pat[i], voice:'lead'});
    seqArr.push({t:tb+0.75, dur:e*0.34, midi:ch[2]+19, voice:'lead'});
    seqArr.push({t:tb+1.75, dur:e*0.34, midi:ch[0]+24, voice:'lead'});
    seqArr.push({t:tb, dur:0.9, midi:ch[0]-12, voice:'bass'});
    seqArr.push({t:tb+1, dur:0.9, midi:ch[1]-12, voice:'bass'});
    tb+=2;
  }
  loopBeats=tb;
}
function setMusicTrack(name){
  if(!TRACKS[name] || name===curTrack) return;
  curTrack=name; buildSeq(name); schedIdx=0;
  if(audioReady && AC) loopStartTime=AC.currentTime+0.1;
}
const ntf = n=> 440*Math.pow(2,(n-69)/12);
function startMusic(){
  if(!audioReady||musicTimer) return;
  buildSeq(curTrack); loopStartTime=AC.currentTime+0.12; schedIdx=0;
  musicTimer=setInterval(()=>{
    if(!musicOn||!audioReady) return;
    const ahead=0.2;
    for(let guard=0; guard<64; guard++){
      const ev=seqArr[schedIdx]; const et=loopStartTime+ev.t*SPB;
      if(et < AC.currentTime+ahead){
        const o=AC.createOscillator(), g=AC.createGain();
        o.type = ev.voice==='lead'?'square':'triangle';
        o.frequency.value=ntf(ev.midi);
        const peak = ev.voice==='lead'?0.16:0.2;
        g.gain.setValueAtTime(0.0001,et);
        g.gain.linearRampToValueAtTime(peak, et+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, et+ev.dur*SPB);
        o.connect(g); g.connect(musicGain); o.start(et); o.stop(et+ev.dur*SPB+0.05);
        schedIdx++; if(schedIdx>=seqArr.length){ schedIdx=0; loopStartTime+=loopBeats*SPB; }
      } else break;
    }
  },30);
}

const SOLID = new Set(['X','S','B','?','!','U','P','T','D']);
function isSolidCh(c){ return SOLID.has(c); }
function solidTile(tx,ty){
  if(ty<0) return false;
  if(tx<0) return true;
  if(tx>=game.grid.w) return false;
  if(ty>=game.grid.h) return false;
  return isSolidCh(game.grid.c[ty][tx]);
}
function gget(x,y){ if(x<0||x>=game.grid.w||y<0||y>=game.grid.h) return ' '; return game.grid.c[y][x]; }
function gset(x,y,ch){ if(x<0||x>=game.grid.w||y<0||y>=game.grid.h) return; game.grid.c[y][x]=ch; }
function collideX(e){
  e.x += e.vx;
  const top=Math.floor(e.y/16), bot=Math.floor((e.y+e.h-1)/16);
  if(e.vx>0){ const tx=Math.floor((e.x+e.w-1)/16); for(let ty=top;ty<=bot;ty++){ if(solidTile(tx,ty)){ e.x=tx*16-e.w; e.vx=0; e._hitR=true; break; } } }
  else if(e.vx<0){ const tx=Math.floor(e.x/16); for(let ty=top;ty<=bot;ty++){ if(solidTile(tx,ty)){ e.x=(tx+1)*16; e.vx=0; e._hitL=true; break; } } }
}
function collideY(e,isPlayer){
  e.y += e.vy;
  const left=Math.floor(e.x/16), right=Math.floor((e.x+e.w-1)/16);
  if(e.vy>0){ const ty=Math.floor((e.y+e.h-1)/16);
    for(let tx=left;tx<=right;tx++){ if(solidTile(tx,ty)){ e.y=ty*16-e.h;
        if(isPlayer && game.grid.c[ty][tx]==='T'){ e.vy=-SPRING_V; e.onGround=false; e._hitD=false; sfxSpring(); spawnDust(e.x+e.w/2,e.y+e.h); }
        else { e.vy=0; e.onGround=true; e._hitD=true; }
        break; } }
  } else if(e.vy<0){ const ty=Math.floor(e.y/16); const hits=[];
    for(let tx=left;tx<=right;tx++){ if(solidTile(tx,ty)) hits.push(tx); }
    if(hits.length){ e.y=(ty+1)*16; e.vy=0; e._hitU=true;
      if(isPlayer){ const cxf=(e.x+e.w/2)/16; let best=hits[0],bd=1e9; for(const t of hits){ const d=Math.abs(t+0.5-cxf); if(d<bd){bd=d;best=t;} } bumpBlock(best,ty); }
    }
  }
}

function bumpBlock(tx,ty){
  const ch=gget(tx,ty);
  if(ch==='?'||ch==='!'){
    if(ch==='?'){ spawnPopCoin(tx,ty); addCoin(1); addScore(200); sfxCoin(); }
    else { if(game.player.form==='small') spawnItem(new Mushroom(tx,ty-1)); else spawnItem(new Flower(tx,ty)); addScore(1000); sfxSprout(); }
    gset(tx,ty,'U'); bumpAnim(tx,ty);

function bumpEnemiesAbove(tx,ty){
  const x0=tx*16, x1=tx*16+16, topY=ty*16;
  for(const e of game.enemies){ if(e.dead||(e.squash&&e.squash>0)||e.type==='chomper') continue;
    const feet=e.y+e.h;
    if(e.x+e.w>x0 && e.x<x1 && feet>=topY-6 && feet<=topY+8){
      if(e.type==='stomper'){ killEnemy(e); addScore(100); popupWorld(e.x,e.y-4,'100'); }

class Grid{
  constructor(w,h){ this.w=w; this.h=h; this.c=[]; for(let y=0;y<h;y++) this.c.push(new Array(w).fill(' ')); this.gy=h-2; }
  set(x,y,ch){ if(x<0||x>=this.w||y<0||y>=this.h) return; this.c[y][x]=ch; }
  get(x,y){ if(x<0||x>=this.w||y<0||y>=this.h) return ' '; return this.c[y][x]; }
}
function pipe(g,x,h,gy){ for(let j=0;j<h;j++){ g.set(x,gy-1-j,'P'); g.set(x+1,gy-1-j,'P'); } }
function warpPipe(g,x,gy,h){ h=h||2; pipe(g,x,h,gy); g.set(x, gy-1-h, 'N'); }
function stairUp(g,x,n,gy){ for(let i=0;i<n;i++) for(let j=0;j<=i;j++) g.set(x+i,gy-1-j,'S'); }
function stairDown(g,x,n,gy){ for(let i=0;i<n;i++) for(let j=0;j<=(n-1-i);j++) g.set(x+i,gy-1-j,'S'); }
function row(g,x,y,n,ch){ for(let i=0;i<n;i++) g.set(x+i,y,ch); }

function charStats(){ const sk=SKINS[(game.skin)|0]; return (sk&&sk.stats)||{jump:1,speed:1,fall:1}; }

    else if(this.form==='big'){ this.form='small'; this.setSizeKeepFeet(); this.invinc=INVINC; sfxShrink(); spawnSpark(this.x+this.w/2,this.y,'#fff'); }

    if(this.landT>0) this.landT-=dt;
    this.blinkT-=dt; if(this.blinkT<=0){ if(this.blink){ this.blink=false; this.blinkT=rand(1.6,4.5); } else { this.blink=true; this.blinkT=0.12; } }

  }
}

class BossShot{

class Boss{
  constructor(tx,ty){ this.type='boss'; this.w=30; this.h=26; this.x=tx*16; this.y=(ty+1)*16-this.h; this.vx=0; this.vy=0; this.dir=-1; this.hp=3; this.maxhp=3; this.invuln=0; this.flash=0; this.squash=0; this.dead=false; this.deadT=0; this.hopT=0.9; this.onGround=false; this.t=0; this.pattern=null; this.atkT=2.4; this.charging=0; this.windup=0; this.chDir=-1; this.chSpeed=5; this.atkFlip=0; }
  hit(){ if(this.dead||this.invuln>0) return 0; this.hp--; this.invuln=1.0; this.flash=1.0; this.squash=0.45; spawnSpark(this.x+this.w/2,this.y+4,'#ffd34d'); if(this.hp<=0){ this.dead=true; this.vy=-6; this.vx=(this.dir||1)*-1.6; sfxKick(); return 2; } sfxStomp(); return 1; }
  update(dt){ this.t+=dt;
    if(this.dead){ this.deadT+=dt; this.vy+=GRAVITY_E; if(this.vy>9)this.vy=9; this.y+=this.vy; this.x+=this.vx; if(this.squash>0)this.squash-=dt; return; }
    if(this.invuln>0)this.invuln-=dt; if(this.flash>0)this.flash-=dt; if(this.squash>0)this.squash-=dt*1.6;
    const rage=this.maxhp-this.hp, mul=game.diff.enemyMul;
    if(this.windup>0){ this.vx=0; this.windup-=dt; if(this.windup<=0) this._fire(); }
    else if(this.charging>0){ this.charging-=dt; this.dir=this.chDir; this.vx=this.chDir*this.chSpeed*mul; }
    else { this.vx=this.dir*(0.55+rage*0.28)*mul; if(this.pattern){ this.atkT-=dt; if(this.atkT<=0 && this.onGround) this._chooseAttack(); } }
    this.vy+=GRAVITY_E; if(this.vy>9)this.vy=9;
    this._hitL=this._hitR=this._hitD=false; this.onGround=false;
    collideX(this); if(this._hitL){ this.dir=1; if(this.charging>0)this.charging=0; } if(this._hitR){ this.dir=-1; if(this.charging>0)this.charging=0; }
    collideY(this,false);
    this.hopT-=dt; if(this.onGround&&this.hopT<=0&&this.charging<=0&&this.windup<=0){ this.vy=-(4.8+rage*0.6); this.onGround=false; this.hopT=rand(0.6,1.1)/Math.max(0.5,mul); }
    if(this.y>game.worldH+120){ this.dead=true; }
  }
  _chooseAttack(){ const P=this.pattern; if(!P){ this.atkT=2.5; return; }
    if(P.charge && (this.atkFlip++ % 2 === 1)){ this.chDir=(game.player&&game.player.x<this.x)?-1:1; this.dir=this.chDir; this.chSpeed=P.charge.speed; this.charging=P.charge.dur; sfxKick(); }
    else if(P.shoot){ this.windup=0.34; }
    this.atkT=(P.every||2.2)/Math.max(0.6, game.diff.enemyMul);
  }
  _fire(){ const S=this.pattern&&this.pattern.shoot; if(!S||!game.player) return;
    const ox=this.x+this.w/2, oy=this.y+this.h*0.4, px=game.player.x+8, py=game.player.y+10;
    const n=S.n||1, base=Math.atan2(py-oy,px-ox), spread=S.spread||0;
    for(let i=0;i<n;i++){ const a=base+(n>1?(i/(n-1)-0.5)*spread:0); game.bossShots.push(new BossShot(ox,oy,Math.cos(a)*S.speed,Math.sin(a)*S.speed,S.kind,S.grav||0)); }
    sfxFire();
  }
  draw(){ const cx=this.x+this.w/2, feet=this.y+this.h, sq=this.squash>0?this.squash:0; const P=this.pal||{body:'#4a8f3c',belly:'#bfe89a',horn:'#2f5f24',brow:'#243a16'};
    const bw=this.w*(1+sq*0.22), bh=this.h*(1-sq*0.38), bx=cx-bw/2, by=feet-bh, rage=this.maxhp-this.hp;
    ctx.fillStyle='rgba(0,0,0,0.22)'; ellipse(cx,feet+2,bw*0.55,3);
    ctx.save();
    if(this.dead){ ctx.translate(cx,feet-bh*0.5); ctx.rotate(this.deadT*3.2); ctx.translate(-cx,-(feet-bh*0.5)); ctx.globalAlpha=Math.max(0,1-this.deadT*0.5); }
    const flash=!this.dead&&this.flash>0&&Math.floor(this.t*20)%2===0;
    if(!this.dead){ ctx.fillStyle='#ffcf3f'; const cwy=by-7,cwx=cx-bw*0.30,cww=bw*0.6; ctx.beginPath(); ctx.moveTo(cwx,cwy+9); ctx.lineTo(cwx,cwy); ctx.lineTo(cwx+cww*0.25,cwy+5); ctx.lineTo(cwx+cww*0.5,cwy-3); ctx.lineTo(cwx+cww*0.75,cwy+5); ctx.lineTo(cwx+cww,cwy); ctx.lineTo(cwx+cww,cwy+9); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#b6860a'; ctx.lineWidth=1; ctx.stroke(); }
    ctx.fillStyle=flash?'#fff':P.body; rr(ctx,bx,by,bw,bh,9); ctx.fill();
    ctx.fillStyle=flash?'#fff':P.belly; rr(ctx,bx+bw*0.22,by+bh*0.42,bw*0.56,bh*0.5,7); ctx.fill();
    ctx.fillStyle=P.horn; for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(cx+i*bw*0.2,by+1); ctx.lineTo(cx+i*bw*0.2-2,by-4); ctx.lineTo(cx+i*bw*0.2+2,by-4); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle='#fff'; ellipse(cx-bw*0.18,by+bh*0.34,bw*0.13,bh*0.17); ellipse(cx+bw*0.18,by+bh*0.34,bw*0.13,bh*0.17);
    if(this.dead){ ctx.strokeStyle='#1a1008'; ctx.lineWidth=1.6; for(const sx of [-1,1]){ const ex=cx+sx*bw*0.18; ctx.beginPath(); ctx.moveTo(ex-2.5,by+bh*0.30); ctx.lineTo(ex+2.5,by+bh*0.40); ctx.moveTo(ex+2.5,by+bh*0.30); ctx.lineTo(ex-2.5,by+bh*0.40); ctx.stroke(); } }
    else { ctx.fillStyle='#1a1008'; const lk=this.dir*1.6; ellipse(cx-bw*0.18+lk,by+bh*0.36,bw*0.055,bh*0.09); ellipse(cx+bw*0.18+lk,by+bh*0.36,bw*0.055,bh*0.09);
      ctx.strokeStyle=P.brow; ctx.lineWidth=2; const drop=1+rage*1.3; ctx.beginPath(); ctx.moveTo(cx-bw*0.30,by+bh*0.20); ctx.lineTo(cx-bw*0.05,by+bh*0.20+drop); ctx.moveTo(cx+bw*0.30,by+bh*0.20); ctx.lineTo(cx+bw*0.05,by+bh*0.20+drop); ctx.stroke();
      ctx.strokeStyle=P.brow; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,by+bh*0.68,bw*0.16,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); }
    ctx.restore();
  }
}

function drawTraitIcon(cx,cy,r,type,col){

  else if(type==='speed'){ for(const dx of [-r*0.5, r*0.1]){ ctx.beginPath(); ctx.moveTo(cx+dx-r*0.2,cy-r*0.65); ctx.lineTo(cx+dx+r*0.45,cy); ctx.lineTo(cx+dx-r*0.2,cy+r*0.65); ctx.stroke(); } }

  else if(type==='star'){ ctx.beginPath(); for(let i=0;i<10;i++){ const a=-Math.PI/2+i*Math.PI/5, rr2=(i%2)?r*0.45:r; const x=cx+Math.cos(a)*rr2,y=cy+Math.sin(a)*rr2; i?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.closePath(); ctx.fill(); }
  else if(type==='sparkle'){ ctx.beginPath(); for(let i=0;i<4;i++){ const a=i/4*Math.PI*2; ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r); } ctx.stroke(); ctx.beginPath(); ctx.arc(cx,cy,r*0.2,0,7); ctx.fill(); }

function drawZones(){ if(!game.zones||!game.zones.length) return; const t=animClock;
  for(const z of game.zones){
    if(z.kind==='conveyor'){
      ctx.save(); ctx.beginPath(); ctx.rect(z.x,z.y-1,z.w,5); ctx.clip();
      ctx.fillStyle='rgba(255,210,58,0.55)'; const off=((t*40*z.dir)%16+16)%16;
      for(let x=z.x-16;x<z.x+z.w+16;x+=16){ const cx=x+off; ctx.beginPath();
        if(z.dir>0){ ctx.moveTo(cx,z.y); ctx.lineTo(cx+5,z.y+2); ctx.lineTo(cx,z.y+4);} else { ctx.moveTo(cx+5,z.y); ctx.lineTo(cx,z.y+2); ctx.lineTo(cx+5,z.y+4);} ctx.fill(); }
      ctx.restore();
    } else if(z.kind==='current'){
      ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle='#cdeeff'; ctx.lineWidth=1.6; ctx.lineCap='round';
      const dx=z.dx||0, dy=z.dy||0, cols=4, rows=4;
      for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){
        const baseX=z.x+(i+0.5)*z.w/cols, baseY=z.y+(j+0.5)*z.h/rows;
        const ph=((t*0.8+ i*0.13 + j*0.21)%1);
        const ax=baseX + dx*(ph-0.5)*z.w/cols*1.4, ay=baseY + dy*(ph-0.5)*z.h/rows*1.4;
        ctx.globalAlpha=0.5*(1-Math.abs(ph-0.5)*1.6);
        ctx.beginPath(); ctx.moveTo(ax-dx*4,ay-dy*4); ctx.lineTo(ax,ay); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax-dx*3+dy*2,ay-dy*3-dx*2); ctx.moveTo(ax,ay); ctx.lineTo(ax-dx*3-dy*2,ay-dy*3+dx*2); ctx.stroke();
      }
      ctx.restore();
    } else if(z.kind==='wind'){
      ctx.save(); ctx.globalAlpha=0.42; ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.4; ctx.lineCap='round';
      for(let i=0;i<10;i++){ const len=8+(i%3)*5; const ax=z.x+(((i*61 + t*130*z.dir)%z.w)+z.w)%z.w, ay=z.y+((i*53)%z.h);
        ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax+z.dir*len,ay); ctx.stroke(); }
      ctx.restore();
    }
  }
}

function renderStage(){
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height);
  const th = game.theme || THEMES.overworld;
  drawSky(th);
  if(!game.grid){ drawTitle(); return; }
  drawMountains(th);
  worldTransform(0.55); drawHills(th);
  worldTransform(0.35); drawClouds(th);
  worldTransform(1); drawBushes(th); drawTiles(th); drawGoal(th); drawZones();
  for(const cp of game.checkpoints) drawCheckpoint(cp);
  for(const pf of game.platforms) pf.draw();
  for(const it of game.items) it.draw();
  for(const hz of game.hazards) hz.draw();
  for(const e of game.enemies) e.draw();
  if(game.boss) game.boss.draw();
  for(const sh of game.bossShots) sh.draw();
  for(const f of game.fireballs) f.draw();
  for(const p of game.particles) p.draw();
  if(game.player) game.player.draw();
  for(const pc of game.popcoins) pc.draw();
  for(const pu of game.popups) pu.draw();
  ctx.setTransform(1,0,0,1,0,0);
  if(game.water){ ctx.fillStyle='rgba(40,120,180,0.14)'; ctx.fillRect(0,0,canvas.width,canvas.height); }
  drawHUD();
  if(game.boss && !game.boss.dead) drawBossHP();
  if(game.state==='paused') drawPause();
  else if(game.state==='levelclear') drawClearOverlay();
  else if(game.state==='gameover') drawGameOver();
  else if(game.state==='win') drawWin();
}

function resolvePlayerEnemies(){

    if(p.star>0){ killEnemy(e); addScore(200); popupWorld(e.x,e.y-4,'200','#ffe24d'); sfxStomp(); continue; }

function applyZones(p){
  if(!game.zones||!game.zones.length) return;
  const ox=p.x+p.w*0.5, top=p.y, bot=p.y+p.h;
  for(const z of game.zones){

    if(cleared){ mapStar(p.x,p.y,R*0.52,'#ffd24d','#b9780c'); }
    else if(boss && !locked){ ctx.fillStyle='#ffcf3f'; const cw=R*0.92, x0=p.x-cw/2, y0=p.y-R*0.12; ctx.beginPath(); ctx.moveTo(x0,y0+R*0.42); ctx.lineTo(x0,y0); ctx.lineTo(x0+cw*0.25,y0+R*0.22); ctx.lineTo(x0+cw*0.5,y0-R*0.2); ctx.lineTo(x0+cw*0.75,y0+R*0.22); ctx.lineTo(x0+cw,y0); ctx.lineTo(x0+cw,y0+R*0.42); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#b6860a'; ctx.lineWidth=1; ctx.stroke(); ctx.fillStyle='#e23b50'; ctx.beginPath(); ctx.arc(p.x,p.y+R*0.5,R*0.12,0,7); ctx.fill(); }
    else if(locked){ ctx.fillStyle='#5f656d'; rr(ctx,p.x-R*0.34,p.y-R*0.04,R*0.68,R*0.5,2); ctx.fill(); ctx.strokeStyle='#5f656d'; ctx.lineWidth=R*0.15; ctx.beginPath(); ctx.arc(p.x,p.y-R*0.06,R*0.26,Math.PI,0); ctx.stroke(); ctx.fillStyle='#33373e'; ctx.beginPath(); ctx.arc(p.x,p.y+R*0.14,R*0.07,0,7); ctx.fill(); }
    else { ctx.fillStyle=acc; ctx.font='bold '+Math.round(R*0.95)+'px "Baloo 2","Hiragino Maru Gothic ProN",sans-serif'; const lab=(MAP_NODES[i].name||'').slice(-1); ctx.fillText(lab,p.x,p.y+R*0.05); }
    if(cur){ const pr=R+canvas.height*0.014+Math.sin(animClock*5)*canvas.height*0.004; ctx.strokeStyle='#ffd23a'; ctx.lineWidth=R*0.16; ctx.beginPath(); ctx.arc(p.x,p.y,pr,0,7); ctx.stroke();
      const ay=p.y-pr-canvas.height*0.018-Math.abs(Math.sin(animClock*4))*canvas.height*0.006; ctx.fillStyle='#ffd23a'; ctx.beginPath(); ctx.moveTo(p.x-R*0.3,ay); ctx.lineTo(p.x+R*0.3,ay); ctx.lineTo(p.x,ay+R*0.34); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#b9780c'; ctx.lineWidth=1; ctx.stroke(); }
    const nm=MAP_NODES[i].name||''; ctx.font='bold '+Math.round(R*0.5)+'px "Baloo 2","Hiragino Maru Gothic ProN",sans-serif'; const tw=ctx.measureText(nm).width+R*0.6;
    ctx.fillStyle='rgba(20,30,50,0.42)'; rr(ctx,p.x-tw/2,p.y+R*1.18,tw,R*0.72,R*0.36); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillText(nm,p.x,p.y+R*1.18+R*0.4);
  }
  drawCastle(x,y){ const W=canvas.width, w=W*0.058, h=w*1.0, top=y-h;
    ctx.fillStyle='rgba(0,0,0,0.15)'; ellipse(x+w*0.5,y+h*0.06,w*0.7,h*0.12);
    ctx.fillStyle='#9c8158'; ctx.fillRect(x-w*0.12,top+h*0.12,w*0.2,h*0.95); ctx.fillRect(x+w*0.92,top+h*0.12,w*0.2,h*0.95);
    const wall=ctx.createLinearGradient(0,top,0,y); wall.addColorStop(0,'#d8c6a4'); wall.addColorStop(1,'#b59a72'); ctx.fillStyle=wall; ctx.fillRect(x,top,w,h);
    ctx.fillStyle='#8a7048'; for(let i=-0.12;i<1.1;i+=0.22) ctx.fillRect(x+w*i,top-h*0.08,w*0.12,h*0.1);
    ctx.fillStyle='#7a5a3a'; ctx.beginPath(); ctx.moveTo(x+w*0.34,y); ctx.lineTo(x+w*0.34,top+h*0.5); ctx.arc(x+w*0.5,top+h*0.5,w*0.16,Math.PI,0); ctx.lineTo(x+w*0.66,y); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#3a2a44'; rr(ctx,x+w*0.12,top+h*0.22,w*0.16,h*0.22,3); ctx.fill(); rr(ctx,x+w*0.72,top+h*0.22,w*0.16,h*0.22,3); ctx.fill();
    ctx.fillStyle='#3aa33a'; ctx.fillRect(x+w*0.49,top-h*0.34,w*0.04,h*0.26); const fw=Math.sin(animClock*5)*2; ctx.fillStyle='#ff4d4d'; ctx.beginPath(); ctx.moveTo(x+w*0.5,top-h*0.34); ctx.lineTo(x+w*0.5+w*0.34+fw,top-h*0.26); ctx.lineTo(x+w*0.5,top-h*0.18); ctx.closePath(); ctx.fill();
  }
  banner(cx,cy,text){ const H=canvas.height; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='bold '+Math.round(H*0.05)+'px "Baloo 2","Hiragino Maru Gothic ProN",sans-serif';
    const w=ctx.measureText(text).width+H*0.12, h=H*0.084, x=cx-w/2, y=cy-h/2;
    ctx.fillStyle='#c2581f'; ctx.beginPath(); ctx.moveTo(x,y+h*0.1); ctx.lineTo(x-H*0.05,y+h/2); ctx.lineTo(x,y+h*0.9); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(x+w,y+h*0.1); ctx.lineTo(x+w+H*0.05,y+h/2); ctx.lineTo(x+w,y+h*0.9); ctx.closePath(); ctx.fill();
    const g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,'#ffb14d'); g.addColorStop(1,'#ef7a1e'); ctx.fillStyle=g; rr(ctx,x,y,w,h,h*0.28); ctx.fill();
    ctx.strokeStyle='#9e3f12'; ctx.lineWidth=2; rr(ctx,x,y,w,h,h*0.28); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)'; rr(ctx,x+4,y+3,w-8,h*0.26,h*0.13); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillText(text,cx,cy+1); ctx.strokeStyle='rgba(120,50,10,0.5)'; ctx.lineWidth=0.6; ctx.strokeText(text,cx,cy+1);
  }
}

  update(dt){}

    ctx.fillStyle='#10183a'; ctx.fillRect(0,0,canvas.width,canvas.height);

/* ===== scenes/TitleScene.js ===== */
class TitleScene{
  update(dt){ inputBegin();
    if(edge.left||edge.right){ const n=DIFFICULTY.length; game.difficulty=(game.difficulty+(edge.right?1:n-1))%n; game.diff=DIFFICULTY[game.difficulty]; game.lives=game.diff.lives; sfxCoin(); saveProgress(); }
    if(edge.up||edge.down){ const dir=edge.down?1:-1; let i=game.skin|0; for(let k=0;k<SKINS.length;k++){ i=(i+dir+SKINS.length)%SKINS.length; if(skinUnlocked(i)){ game.skin=i; sfxCoin(); saveProgress(); break; } } }
    updateMenu(dt); inputEnd(); }
  render(){ renderTitle(); }
}

/* ===== scenes/StageScene.js ===== */
class StageScene{
  update(dt){
    inputBegin();
    if(game.state==='gameover'||game.state==='win') updateMenu(dt);
    else if(game.state==='paused'){
      if(game.pauseConfirm){
        if(edge.left){ if(game.confirmSel!==0){ game.confirmSel=0; sfxJump(); } }
        else if(edge.right){ if(game.confirmSel!==1){ game.confirmSel=1; sfxJump(); } }
        else if(edge.jump||edge.start){ if((game.confirmSel|0)===0){ returnToMap(); } else { game.pauseConfirm=false; sfxPause(); } }
        else if(edge.pause){ game.pauseConfirm=false; sfxPause(); }
      } else {
        if(edge.pause){ game.state='playing'; duckMusic(1); sfxPause(); }
        else if(edge.left){ if(game.pauseSel!==0){ game.pauseSel=0; sfxJump(); } }
        else if(edge.right){ if(game.pauseSel!==1){ game.pauseSel=1; sfxJump(); } }
        else if(edge.jump||edge.start){ if((game.pauseSel|0)===1){ game.pauseConfirm=true; game.confirmSel=1; sfxPause(); } else { game.state='playing'; duckMusic(1); sfxPause(); } }
      }
    }
    else if(game.state==='playing') updatePlaying(dt);
    else if(game.state==='dying'){ updateDying(dt); updateParticlesOnly(dt); }
    else if(game.state==='levelclear'){ updateClear(dt); updateParticlesOnly(dt); }
    inputEnd();
  }
  render(){ renderStage(); }
}

/* ===== scenes/OpeningScene.js ===== */
class OpeningScene{
  enter(){ this.sel = hasSave() ? 1 : 0; setMusicTrack('map'); }
  update(){
    inputBegin();
    const canLoad = hasSave();
    if(!canLoad) this.sel = 0;
    if(edge.left || edge.right){ if(canLoad){ this.sel = this.sel === 0 ? 1 : 0; sfxJump(); } }
    else if(edge.jump || edge.start){ this._choose(canLoad); }
    inputEnd();
  }
  _choose(canLoad){
    if(this.sel === 1 && canLoad) loadProgress(); else wipeSave();
    sfxCoin(); game.state = 'title';
  }
  render(){ renderOpening(this.sel, hasSave()); }
}

/* ===== scenes/SceneManager.js ===== */
class SceneManager{
  constructor(){ this.scenes={}; this.current=null; this.currentName=null; }
  register(name, scene){ this.scenes[name]=scene; scene.manager=this; }
  set(name){ const s=this.scenes[name]; if(s){ this.currentName=name; this.current=s; if(s.enter) s.enter(); } }
  sync(){ let want='stage'; if(game.state==='opening') want='opening'; else if(game.state==='title') want='title'; else if(game.state==='worldmap') want='worldmap'; if(want!==this.currentName) this.set(want); }
  update(dt){ if(this.current && this.current.update) this.current.update(dt); this.sync(); }
  render(){ if(this.current && this.current.render) this.current.render(); }
}
const scenes = new SceneManager();
scenes.register('opening', new OpeningScene());
scenes.register('title', new TitleScene());
scenes.register('stage', new StageScene());
scenes.register('worldmap', new WorldMapScene());
scenes.register('boss', new BossScene());
scenes.register('cutscene', new CutsceneScene());

/* ===== engine/loop.js ===== */
let animClock = 0, last = 0, acc = 0;
function frame(t){ if(!last) last=t; let dt=(t-last)/1000; last=t; if(dt>0.1)dt=0.1; animClock+=dt; acc+=dt; let steps=0; while(acc>=STEP && steps<5){ scenes.update(STEP); acc-=STEP; steps++; } if(acc>STEP) acc=0; scenes.render(); requestAnimationFrame(frame); }
function startLoop(){ requestAnimationFrame(frame); }

/* ===== core/input.js ===== */
// ============ INPUT ============
const input = { left:false,right:false,down:false,jump:false,fire:false,start:false,pause:false };
const prevIn = { left:false,right:false,down:false,jump:false,fire:false,start:false,pause:false };
const edge = { left:false,right:false,down:false,jump:false,fire:false,start:false,pause:false };
function inputBegin(){ edge.left=input.left&&!prevIn.left; edge.right=input.right&&!prevIn.right; edge.down=input.down&&!prevIn.down; edge.jump=input.jump&&!prevIn.jump; edge.fire=input.fire&&!prevIn.fire; edge.start=input.start&&!prevIn.start; edge.pause=input.pause&&!prevIn.pause; }
function inputEnd(){ prevIn.left=input.left; prevIn.right=input.right; prevIn.down=input.down; prevIn.jump=input.jump; prevIn.fire=input.fire; prevIn.start=input.start; prevIn.pause=input.pause; }

window.addEventListener('keydown', e=>{
  initAudioOnce();
  switch(e.code){
    case 'ArrowLeft': case 'KeyA': input.left=true; e.preventDefault(); break;
    case 'ArrowRight': case 'KeyD': input.right=true; e.preventDefault(); break;
    case 'ArrowDown': case 'KeyS': input.down=true; e.preventDefault(); break;
    case 'ArrowUp': case 'KeyW': case 'Space': case 'KeyZ': case 'KeyK': input.jump=true; e.preventDefault(); break;
    case 'KeyX': case 'KeyJ': case 'ShiftLeft': case 'ShiftRight': input.fire=true; break;
    case 'Enter': input.start=true; input.pause=true; e.preventDefault(); break;
    case 'KeyP': input.pause=true; break;
    case 'KeyM': if(!e.repeat) toggleMute(); break;
  }
});
window.addEventListener('keyup', e=>{
  switch(e.code){
    case 'ArrowLeft': case 'KeyA': input.left=false; break;
    case 'ArrowRight': case 'KeyD': input.right=false; break;
    case 'ArrowDown': case 'KeyS': input.down=false; break;
    case 'ArrowUp': case 'KeyW': case 'Space': case 'KeyZ': case 'KeyK': input.jump=false; break;
    case 'KeyX': case 'KeyJ': case 'ShiftLeft': case 'ShiftRight': input.fire=false; break;
    case 'Enter': input.start=false; input.pause=false; break;
    case 'KeyP': input.pause=false; break;
  }
});
function bindBtn(id,key){
  const el=document.getElementById(id); if(!el) return;
  const on=(e)=>{ e.preventDefault(); try{el.setPointerCapture(e.pointerId);}catch(_){} input[key]=true; initAudioOnce(); };
  const off=()=>{ input[key]=false; };
  el.addEventListener('pointerdown',on);
  el.addEventListener('pointerup',off);
  el.addEventListener('pointercancel',off);
  el.addEventListener('lostpointercapture',off);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}
bindBtn('btn-left','left'); bindBtn('btn-right','right'); bindBtn('btn-down','down');
bindBtn('btn-a','jump'); bindBtn('btn-b','fire');
if(window.matchMedia && window.matchMedia('(pointer:coarse)').matches){ document.getElementById('touch').classList.add('show'); }
window.addEventListener('touchstart', ()=>{ document.getElementById('touch').classList.add('show'); }, {once:true, passive:true});

/* ===== main.js ===== */
function openPause(){ if(game.state==='playing'){ game.state='paused'; game.pauseSel=0; game.pauseConfirm=false; duckMusic(0); sfxPause(); } }
function resumePlay(){ game.state='playing'; game.pauseConfirm=false; duckMusic(1); sfxPause(); }
function doPauseAct(act){
  if(act==='resume') resumePlay();
  else if(act==='retire'){ game.pauseConfirm=true; game.confirmSel=1; sfxPause(); }
  else if(act==='confirm-yes') returnToMap();
  else if(act==='confirm-no'){ game.pauseConfirm=false; sfxPause(); }
}

canvas.addEventListener('pointerdown', (e)=>{
  initAudioOnce();
  if(game.state==='title'||game.state==='gameover'||game.state==='win'){ game.oneShotStart=true; return; }
  // tappable pause menu
  if(game.state==='opening' && game._openHit){
    const r=canvas.getBoundingClientRect(); const sx=canvas.width/(r.width||1), sy=canvas.height/(r.height||1);
    const px=(e.clientX-r.left)*sx, py=(e.clientY-r.top)*sy;
    for(const h of game._openHit){ if(px>=h.x&&px<=h.x+h.w&&py>=h.y&&py<=h.y+h.h){ if(h.act==='new'){ wipeSave(); } else { loadProgress(); } game.state='title'; break; } }
    return;
  }
  if(game.state==='paused' && game._pauseHit){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/(r.width||1), sy=canvas.height/(r.height||1);
    const px=(e.clientX-r.left)*sx, py=(e.clientY-r.top)*sy;
    for(const h of game._pauseHit){ if(px>=h.x&&px<=h.x+h.w&&py>=h.y&&py<=h.y+h.h){ doPauseAct(h.act); break; } }
  }
});
document.getElementById('muteBtn').addEventListener('click', ()=>{ initAudioOnce(); toggleMute(); });
const pauseBtn=document.getElementById('pauseBtn');
if(pauseBtn) pauseBtn.addEventListener('click', ()=>{ initAudioOnce(); if(game.state==='playing') openPause(); else if(game.state==='paused') resumePlay(); });
document.getElementById('fsBtn').addEventListener('click', ()=>{
  if(!document.fullscreenElement){ const f=stage.requestFullscreen||stage.webkitRequestFullscreen; if(f) f.call(stage); }
  else if(document.exitFullscreen) document.exitFullscreen();
});

game.state='opening';
scenes.set('opening');
resize();
startLoop();

})();
</script>
