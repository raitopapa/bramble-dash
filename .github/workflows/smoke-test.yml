name: Smoke Test

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Run static smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run smoke test
        run: npm test
