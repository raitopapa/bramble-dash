<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bramble's Dash - ブランブルのぼうけん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --bg0:#10183a; --bg1:#1b2a5e; --accent:#ffd23a; --accent2:#ff7a3a; --panel:#0c1330; --line:#39509e;
    --moveSize:clamp(78px,15vmin,124px); --jumpSize:clamp(92px,18vmin,150px); --dashSize:clamp(62px,12vmin,102px); }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:"Baloo 2","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #2a3f86 0%, rgba(42,63,134,0) 60%),
      radial-gradient(900px 600px at 85% 110%, #3a2a6e 0%, rgba(58,42,110,0) 55%),
      linear-gradient(160deg, var(--bg0), #0a1130 70%);
    color:#eaf0ff; min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:14px 12px 26px; -webkit-tap-highlight-color:transparent; overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.25;
    background-image:radial-gradient(rgba(255,255,255,.12) 1px, transparent 1px);
    background-size:22px 22px; -webkit-mask:radial-gradient(120% 100% at 50% 0, #000 30%, transparent 75%);
    mask:radial-gradient(120% 100% at 50% 0, #000 30%, transparent 75%);
  }
  header{ text-align:center; margin-bottom:12px; z-index:1; }
  header h1{
    font-family:"Press Start 2P",monospace; font-weight:400;
    font-size:clamp(14px,3.6vw,26px); letter-spacing:1px; margin:0; color:var(--accent);
    text-shadow:0 2px 0 #b9780c,0 4px 0 #7a4e06,0 6px 10px rgba(0,0,0,.5);
  }
  header p{ margin:8px 0 0; font-weight:700; font-size:clamp(11px,2.2vw,14px); color:#bcd0ff; opacity:.9; }
  .stage-wrap{ position:relative; width:100%; max-width:980px; z-index:1; }
  .stage{
    position:relative; width:100%; aspect-ratio:16/9; border-radius:18px; overflow:hidden; background:#7cc0ff;
    box-shadow:0 0 0 4px #0c1330,0 0 0 10px #2a3f86,0 18px 40px rgba(0,0,0,.55),inset 0 0 60px rgba(0,0,0,.25);
  }
  .stage::after{
    content:""; position:absolute; inset:0; pointer-events:none; border-radius:18px;
    box-shadow:inset 0 0 90px rgba(0,0,0,.28);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 18%);
  }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }
  .stage:fullscreen, .stage:-webkit-full-screen{ width:100vw; height:100vh; max-width:none; aspect-ratio:auto; border-radius:0; }
  .stage:fullscreen::after, .stage:-webkit-full-screen::after{ border-radius:0; }
  .topbtns{ position:absolute; top:max(10px,env(safe-area-inset-top)); right:max(10px,env(safe-area-inset-right)); display:flex; gap:10px; z-index:6; }
  .iconbtn{
    width:44px; height:44px; border-radius:13px; border:none; cursor:pointer;
    background:rgba(12,19,48,.6); color:#fff; font-size:20px; font-weight:800;
    backdrop-filter:blur(4px); box-shadow:0 3px 10px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  .iconbtn:active{ transform:translateY(1px) scale(.96); }
  .touch{ position:absolute; inset:0; z-index:4; pointer-events:none; display:none; }
  .touch.show{ display:block; }
  .pad{ position:absolute; left:max(18px,env(safe-area-inset-left)); bottom:max(20px,env(safe-area-inset-bottom)); display:flex; gap:14px; align-items:flex-end; }
  .btns{ position:absolute; right:max(18px,env(safe-area-inset-right)); bottom:max(20px,env(safe-area-inset-bottom)); display:flex; gap:16px; align-items:flex-end; }
  .tbtn{
    pointer-events:auto; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; touch-action:none;
    border:none; color:#fff; font-family:"Baloo 2","Hiragino Maru Gothic ProN",sans-serif; font-weight:800; line-height:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-shadow:0 2px 4px rgba(0,0,0,.45);
    transition:transform .04s, filter .04s;
  }
  .tbtn:active{ transform:translateY(2px) scale(.94); filter:brightness(1.18); }
  .tbtn .lbl{ font-size:.4em; margin-top:.22em; letter-spacing:.5px; opacity:.96; white-space:nowrap; }
  .move{ width:var(--moveSize); height:var(--moveSize); border-radius:26px; font-size:calc(var(--moveSize)*.5);
    background:linear-gradient(180deg,rgba(86,140,235,.66),rgba(44,86,180,.66));
    box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 3px 0 rgba(255,255,255,.3), inset 0 0 0 3px rgba(255,255,255,.2); }
  .jump{ width:var(--jumpSize); height:var(--jumpSize); border-radius:50%; font-size:calc(var(--jumpSize)*.3);
    background:radial-gradient(circle at 50% 34%,#84e792,#34a24c 72%);
    box-shadow:0 9px 22px rgba(0,0,0,.5), inset 0 4px 0 rgba(255,255,255,.38), inset 0 0 0 4px rgba(255,255,255,.24); }
  .jump .ico{ font-size:1.55em; }
  .dash{ width:var(--dashSize); height:var(--dashSize); border-radius:50%; margin-bottom:calc(var(--jumpSize)*.3); font-size:calc(var(--dashSize)*.34);
    background:radial-gradient(circle at 50% 34%,#ffc857,#ef8a26 72%);
    box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 3px 0 rgba(255,255,255,.32), inset 0 0 0 3px rgba(255,255,255,.22); }
  .dash .ico{ font-size:1.25em; }
  .legend{ margin-top:14px; display:flex; flex-wrap:wrap; gap:8px 10px; justify-content:center; z-index:1; max-width:900px; }
  .chip{ background:var(--panel); border:1.5px solid var(--line); border-radius:999px; padding:6px 12px; font-weight:700; font-size:12.5px; color:#cfe0ff; display:flex; align-items:center; gap:7px; }
  .chip b{ color:var(--accent); font-family:"Press Start 2P",monospace; font-size:10px; }
  footer{ margin-top:16px; font-size:12px; color:#8ea0d8; text-align:center; z-index:1; }
  @media (max-width:560px){ header p{ display:none; } .legend{ display:none; } }
</style>
</head>
<body>
  <header>
    <h1>BRAMBLE'S DASH</h1>
    <p>ブランブルのぼうけん — 横スクロール アクション</p>
  </header>
  <div class="stage-wrap">
    <div class="stage" id="stage">
      <canvas id="game"></canvas>
      <div class="topbtns">
        <button class="iconbtn" id="pauseBtn" title="ポーズ">&#10074;&#10074;</button>
        <button class="iconbtn" id="muteBtn" title="ミュート">&#9834;</button>
        <button class="iconbtn" id="fsBtn" title="全画面">&#9974;</button>
      </div>
      <div class="touch" id="touch">
        <div class="pad">
          <button class="tbtn move" id="btn-left" aria-label="ひだりにすすむ">&#9664;</button>
          <button class="tbtn move" id="btn-right" aria-label="みぎにすすむ">&#9654;</button>
          <button id="btn-down" aria-label="しゃがむ" style="display:none">&#9660;</button>
        </div>
        <div class="btns">
          <button class="tbtn dash" id="btn-b" aria-label="ダッシュ"><span class="ico">&#187;</span><span class="lbl">ダッシュ</span></button>
          <button class="tbtn jump" id="btn-a" aria-label="ジャンプ"><span class="ico">&#9650;</span><span class="lbl">ジャンプ</span></button>
        </div>
      </div>
    </div>
  </div>
  <div class="legend">
    <span class="chip"><b>&#8592; &#8594;</b> 移動</span>
    <span class="chip"><b>SPACE / &#8593; / Z</b> ジャンプ</span>
    <span class="chip"><b>X / SHIFT</b> ダッシュ・ファイア</span>
    <span class="chip"><b>&#8595;</b> しゃがむ</span>
    <span class="chip"><b>P / ENTER</b> ポーズ</span>
    <span class="chip"><b>M</b> 音切替</span>
  </div>
  <footer>キノコで大きく、花でファイア。敵は上から踏む。甲羅は蹴れる。土管の花に注意！</footer>
<script>
<!--BUNDLE-->
</script>
</body>
</html>
